name: Run API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pytest requests pyyaml pytest-html

    - name: Run tests
      run: |
        pytest test_jsonplaceholder.py --html=report.html --self-contained-html

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: report.html